<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="rocket" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="flame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FCD34D"/>
      <stop offset="100%" stop-color="#F97316"/>
    </linearGradient>
  </defs>
  <rect width="480" height="480" fill="url(#bg)" rx="16"/>

  <!-- Stars / dots background -->
  <circle cx="80" cy="60" r="3" fill="#6366F1" opacity="0.4"/>
  <circle cx="160" cy="40" r="2" fill="#6366F1" opacity="0.3"/>
  <circle cx="320" cy="30" r="3" fill="#6366F1" opacity="0.4"/>
  <circle cx="420" cy="55" r="2" fill="#6366F1" opacity="0.3"/>
  <circle cx="50" cy="160" r="2" fill="#6366F1" opacity="0.3"/>
  <circle cx="440" cy="180" r="3" fill="#6366F1" opacity="0.4"/>
  <circle cx="120" cy="380" r="2" fill="#F59E0B" opacity="0.4"/>
  <circle cx="370" cy="390" r="3" fill="#F59E0B" opacity="0.4"/>

  <!-- Rocket trail -->
  <ellipse cx="253" cy="340" rx="10" ry="22" fill="url(#flame)" opacity="0.9"/>
  <ellipse cx="240" cy="355" rx="16" ry="30" fill="#FCD34D" opacity="0.6"/>
  <ellipse cx="240" cy="375" rx="10" ry="22" fill="#FCD34D" opacity="0.4"/>
  <ellipse cx="240" cy="395" rx="6" ry="15" fill="#FCD34D" opacity="0.2"/>
  <ellipse cx="227" cy="340" rx="10" ry="22" fill="url(#flame)" opacity="0.9"/>

  <!-- Rocket body -->
  <path d="M240 100 Q200 150 195 250 L285 250 Q280 150 240 100 Z" fill="url(#rocket)"/>
  <!-- Rocket nose -->
  <path d="M240 80 Q220 105 220 125 Q230 115 240 100 Q250 115 260 125 Q260 105 240 80 Z" fill="#818CF8"/>
  <!-- Window -->
  <circle cx="240" cy="195" r="22" fill="#BFDBFE" opacity="0.9"/>
  <circle cx="240" cy="195" r="16" fill="#93C5FD" opacity="0.7"/>
  <circle cx="234" cy="188" r="6" fill="white" opacity="0.5"/>
  <!-- Wings left -->
  <path d="M197 250 L165 295 L195 285 L197 250 Z" fill="#818CF8"/>
  <!-- Wings right -->
  <path d="M283 250 L315 295 L285 285 L283 250 Z" fill="#818CF8"/>
  <!-- Rocket shine -->
  <path d="M215 135 Q212 180 215 220" stroke="white" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.3"/>

  <!-- Stars sparkles -->
  <text x="60" y="145" font-size="24" fill="#F59E0B" opacity="0.8">★</text>
  <text x="390" y="130" font-size="22" fill="#6366F1" opacity="0.8">★</text>
  <text x="75" y="300" font-size="18" fill="#6366F1" opacity="0.7">✦</text>
  <text x="392" y="295" font-size="18" fill="#F59E0B" opacity="0.7">✦</text>
  <text x="150" y="65" font-size="16" fill="#F59E0B" opacity="0.7">✦</text>
  <text x="315" y="60" font-size="14" fill="#6366F1" opacity="0.6">✦</text>

  <!-- Confetti -->
  <rect x="48" y="220" width="13" height="6" rx="2" fill="#F59E0B" opacity="0.7" transform="rotate(30,54,223)"/>
  <rect x="418" y="230" width="13" height="6" rx="2" fill="#6366F1" opacity="0.7" transform="rotate(-25,424,233)"/>
  <rect x="80" y="420" width="11" height="5" rx="2" fill="#F59E0B" opacity="0.6" transform="rotate(40,85,422)"/>
  <rect x="395" y="415" width="11" height="5" rx="2" fill="#6366F1" opacity="0.6" transform="rotate(-35,400,417)"/>
  <circle cx="45" cy="390" r="6" fill="#F59E0B" opacity="0.5"/>
  <circle cx="438" cy="380" r="6" fill="#6366F1" opacity="0.5"/>
  <circle cx="165" cy="440" r="5" fill="#6366F1" opacity="0.5"/>
  <circle cx="320" cy="445" r="5" fill="#F59E0B" opacity="0.5"/>

  <!-- Text -->
  <text x="240" y="415" font-family="Georgia, serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#3730A3" letter-spacing="1">Work Anniversary</text>
  <text x="240" y="453" font-family="Georgia, serif" font-size="16" text-anchor="middle" fill="#F59E0B" opacity="0.95">Keep reaching for the stars 🚀</text>
</svg>
