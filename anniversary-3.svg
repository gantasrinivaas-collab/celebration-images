<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F59E0B" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#F59E0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ribbon" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1D4ED8"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>
  <rect width="480" height="480" fill="url(#bg)" rx="16"/>

  <!-- Glow -->
  <ellipse cx="240" cy="210" rx="180" ry="150" fill="url(#glow1)"/>

  <!-- Star constellation dots -->
  <circle cx="100" cy="80" r="2" fill="#F59E0B" opacity="0.8"/>
  <circle cx="160" cy="55" r="1.5" fill="#F59E0B" opacity="0.6"/>
  <circle cx="220" cy="40" r="2" fill="#F59E0B" opacity="0.7"/>
  <circle cx="300" cy="50" r="1.5" fill="#F59E0B" opacity="0.6"/>
  <circle cx="380" cy="70" r="2" fill="#F59E0B" opacity="0.8"/>
  <circle cx="420" cy="120" r="1.5" fill="#F59E0B" opacity="0.5"/>
  <line x1="100" y1="80" x2="160" y2="55" stroke="#F59E0B" stroke-width="0.5" opacity="0.3"/>
  <line x1="160" y1="55" x2="220" y2="40" stroke="#F59E0B" stroke-width="0.5" opacity="0.3"/>
  <line x1="220" y1="40" x2="300" y2="50" stroke="#F59E0B" stroke-width="0.5" opacity="0.3"/>
  <line x1="300" y1="50" x2="380" y2="70" stroke="#F59E0B" stroke-width="0.5" opacity="0.3"/>

  <!-- Center emblem circle -->
  <circle cx="240" cy="195" r="105" fill="none" stroke="#F59E0B" stroke-width="1.5" opacity="0.3"/>
  <circle cx="240" cy="195" r="90" fill="none" stroke="#F59E0B" stroke-width="0.8" opacity="0.2"/>
  <circle cx="240" cy="195" r="78" fill="#1E293B" opacity="0.8"/>
  <circle cx="240" cy="195" r="78" fill="none" stroke="#F59E0B" stroke-width="2" opacity="0.5"/>

  <!-- Large star -->
  <polygon points="240,135 252,175 294,175 261,200 273,240 240,216 207,240 219,200 186,175 228,175" fill="#F59E0B" opacity="0.9"/>
  <polygon points="240,148 249,176 278,176 256,192 265,220 240,204 215,220 224,192 202,176 231,176" fill="#FFF5CC" opacity="0.6"/>

  <!-- Ribbon banner -->
  <path d="M90 290 L130 275 L390 275 L430 290 L390 305 L130 305 Z" fill="url(#ribbon)"/>
  <path d="M90 290 L110 282 L90 275" fill="#1D4ED8"/>
  <path d="M430 290 L410 282 L430 275" fill="#1D4ED8"/>
  <text x="240" y="297" font-family="Georgia, serif" font-size="18" font-weight="bold" text-anchor="middle" fill="white" letter-spacing="3">WORK ANNIVERSARY</text>

  <!-- Small stars scattered -->
  <text x="55" y="180" font-size="16" fill="#F59E0B" opacity="0.7">★</text>
  <text x="410" y="185" font-size="14" fill="#F59E0B" opacity="0.6">★</text>
  <text x="70" y="380" font-size="12" fill="#3B82F6" opacity="0.6">★</text>
  <text x="400" y="375" font-size="14" fill="#3B82F6" opacity="0.6">★</text>

  <!-- Sparkle dots -->
  <circle cx="50" cy="300" r="3" fill="#F59E0B" opacity="0.6"/>
  <circle cx="430" cy="310" r="3" fill="#F59E0B" opacity="0.6"/>
  <circle cx="130" cy="420" r="3" fill="#3B82F6" opacity="0.5"/>
  <circle cx="350" cy="425" r="3" fill="#3B82F6" opacity="0.5"/>
  <circle cx="240" cy="440" r="3" fill="#F59E0B" opacity="0.5"/>

  <!-- Text -->
  <text x="240" y="360" font-family="Georgia, serif" font-size="22" text-anchor="middle" fill="#94A3B8" letter-spacing="1">Honoring your journey</text>
  <text x="240" y="400" font-family="Georgia, serif" font-size="16" text-anchor="middle" fill="#F59E0B" opacity="0.8">Thank you for everything ✨</text>
</svg>
