<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="100%" stop-color="#E2EBF5"/>
    </linearGradient>
    <radialGradient id="centerglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#DBEAFE" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#DBEAFE" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="480" fill="url(#bg)" rx="16"/>

  <!-- Center glow -->
  <ellipse cx="240" cy="210" rx="140" ry="130" fill="url(#centerglow)"/>

  <!-- Laurel wreath - left side -->
  <ellipse cx="128" cy="185" rx="22" ry="32" fill="#16A34A" opacity="0.8" transform="rotate(-50,128,185)"/>
  <ellipse cx="108" cy="155" rx="20" ry="30" fill="#22C55E" opacity="0.7" transform="rotate(-65,108,155)"/>
  <ellipse cx="100" cy="120" rx="18" ry="28" fill="#16A34A" opacity="0.8" transform="rotate(-78,100,120)"/>
  <ellipse cx="108" cy="86" rx="18" ry="27" fill="#22C55E" opacity="0.7" transform="rotate(-92,108,86)"/>
  <ellipse cx="130" cy="58" rx="17" ry="26" fill="#16A34A" opacity="0.8" transform="rotate(-110,130,58)"/>
  <ellipse cx="162" cy="40" rx="16" ry="25" fill="#22C55E" opacity="0.7" transform="rotate(-128,162,40)"/>
  <ellipse cx="198" cy="32" rx="16" ry="24" fill="#16A34A" opacity="0.8" transform="rotate(-148,198,32)"/>

  <!-- Laurel wreath - right side -->
  <ellipse cx="352" cy="185" rx="22" ry="32" fill="#16A34A" opacity="0.8" transform="rotate(50,352,185)"/>
  <ellipse cx="372" cy="155" rx="20" ry="30" fill="#22C55E" opacity="0.7" transform="rotate(65,372,155)"/>
  <ellipse cx="380" cy="120" rx="18" ry="28" fill="#16A34A" opacity="0.8" transform="rotate(78,380,120)"/>
  <ellipse cx="372" cy="86" rx="18" ry="27" fill="#22C55E" opacity="0.7" transform="rotate(92,372,86)"/>
  <ellipse cx="350" cy="58" rx="17" ry="26" fill="#16A34A" opacity="0.8" transform="rotate(110,350,58)"/>
  <ellipse cx="318" cy="40" rx="16" ry="25" fill="#22C55E" opacity="0.7" transform="rotate(128,318,40)"/>
  <ellipse cx="282" cy="32" rx="16" ry="24" fill="#16A34A" opacity="0.8" transform="rotate(148,282,32)"/>

  <!-- Laurel stems -->
  <path d="M120 200 Q140 210 160 250 Q190 300 240 310 Q290 300 320 250 Q340 210 360 200" stroke="#15803D" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Bottom bow -->
  <path d="M200 310 Q220 330 240 325 Q260 330 280 310" stroke="#15803D" stroke-width="4" fill="none" stroke-linecap="round"/>
  <circle cx="240" cy="322" r="7" fill="#F59E0B"/>

  <!-- Center star badge -->
  <circle cx="240" cy="170" r="80" fill="white" opacity="0.7"/>
  <circle cx="240" cy="170" r="72" fill="none" stroke="#1D4ED8" stroke-width="2" opacity="0.4"/>

  <!-- Checkmark / milestone icon -->
  <circle cx="240" cy="170" r="50" fill="#1D4ED8" opacity="0.1"/>
  <polygon points="240,110 250,145 286,145 258,167 269,202 240,182 211,202 222,167 194,145 230,145" fill="#F59E0B" opacity="0.95"/>
  <polygon points="240,120 248,143 272,143 253,157 261,180 240,167 219,180 227,157 208,143 232,143" fill="#FFF9DB" opacity="0.7"/>

  <!-- Sparkles -->
  <text x="55" y="240" font-size="22" fill="#F59E0B" opacity="0.7">✦</text>
  <text x="405" y="240" font-size="20" fill="#16A34A" opacity="0.7">✦</text>
  <text x="70" y="380" font-size="16" fill="#1D4ED8" opacity="0.6">★</text>
  <text x="398" y="375" font-size="16" fill="#F59E0B" opacity="0.6">★</text>

  <!-- Confetti -->
  <rect x="45" y="100" width="12" height="5" rx="2" fill="#F59E0B" opacity="0.6" transform="rotate(25,51,102)"/>
  <rect x="420" y="110" width="12" height="5" rx="2" fill="#16A34A" opacity="0.6" transform="rotate(-30,426,112)"/>
  <rect x="60" y="430" width="10" height="5" rx="2" fill="#1D4ED8" opacity="0.6" transform="rotate(40,65,432)"/>
  <rect x="410" y="435" width="10" height="5" rx="2" fill="#F59E0B" opacity="0.6" transform="rotate(-20,415,437)"/>
  <circle cx="440" cy="300" r="6" fill="#F59E0B" opacity="0.5"/>
  <circle cx="42" cy="310" r="6" fill="#16A34A" opacity="0.5"/>

  <!-- Text -->
  <text x="240" y="365" font-family="Georgia, serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#1E3A5F" letter-spacing="1">Work Anniversary</text>
  <text x="240" y="403" font-family="Georgia, serif" font-size="16" text-anchor="middle" fill="#16A34A" opacity="0.9">A milestone worth celebrating 🌿</text>
</svg>
