  <path d="M335 260 Q333 275 335 285" stroke="#3A86C8" stroke-width="2" fill="none"/>
  <path d="M333 285 Q335 295 341 290 Q335 300 333 295 Q328 305 335 308" stroke="#3A86C8" stroke-width="1.5" fill="none"/>
