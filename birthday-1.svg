  <path d="M240 250 Q238 268 240 280" stroke="#F5A623" stroke-width="2" fill="none"/>
  <path d="M238 280 Q240 292 246 286 Q240 298 238 292 Q232 302 240 306" stroke="#F5A623" stroke-width="1.5" fill="none"/>
