  <text x="240" y="360" font-family="Georgia, serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#C0245A" letter-spacing="1">Happy Birthday!</text>
  <text x="240" y="400" font-family="Georgia, serif" font-size="18" text-anchor="middle" fill="#D63060" opacity="0.8">🎉 Wishing you a wonderful day 🎉</text>
