  <text x="55" y="350" font-size="22" fill="#FFD166" opacity="0.8">★</text>
  <text x="400" y="340" font-size="18" fill="#FF6B9D" opacity="0.7">★</text>
  <text x="210" y="95" font-size="16" fill="#A29BFE" opacity="0.8">★</text>
  <text x="270" y="88" font-size="20" fill="#FFD166" opacity="0.7">★</text>

