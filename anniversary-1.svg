<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#EAF4FB"/>
      <stop offset="100%" stop-color="#C8E6FA"/>
    </radialGradient>
    <radialGradient id="badge" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFE066"/>
      <stop offset="100%" stop-color="#F5A623"/>
    </radialGradient>
    <radialGradient id="inner" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FFF5CC"/>
      <stop offset="100%" stop-color="#FFD166"/>
    </radialGradient>
  </defs>
  <rect width="480" height="480" fill="url(#bg)" rx="16"/>

  <!-- Ribbon below badge -->
  <polygon points="220,350 260,350 270,400 240,385 210,400" fill="#2563EB" opacity="0.9"/>
  <rect x="215" y="345" width="20" height="40" fill="#1D4ED8"/>
  <rect x="245" y="345" width="20" height="40" fill="#1D4ED8"/>

  <!-- Badge outer ring (star burst) -->
  <polygon points="240,115 249,145 278,130 265,158 297,158 275,178 295,205 265,198 260,230 240,210 220,230 215,198 185,205 205,178 183,158 215,158 202,130 231,145" fill="#F5A623" opacity="0.9"/>

  <!-- Badge circle -->
  <circle cx="240" cy="185" r="70" fill="url(#badge)"/>
  <circle cx="240" cy="185" r="62" fill="url(#inner)"/>
  <circle cx="240" cy="185" r="54" fill="none" stroke="#F5A623" stroke-width="3" opacity="0.6"/>

  <!-- Star in badge -->
  <polygon points="240,148 247,170 270,170 252,184 259,206 240,193 221,206 228,184 210,170 233,170" fill="#F5A623"/>

  <!-- Shine on badge -->
  <ellipse cx="225" cy="165" rx="14" ry="9" fill="white" opacity="0.3"/>

  <!-- Decorative dots ring -->
  <circle cx="240" cy="108" r="4" fill="#F5A623" opacity="0.7"/>
  <circle cx="310" cy="130" r="4" fill="#F5A623" opacity="0.7"/>
  <circle cx="318" cy="200" r="4" fill="#F5A623" opacity="0.7"/>
  <circle cx="170" cy="130" r="4" fill="#F5A623" opacity="0.7"/>
  <circle cx="162" cy="200" r="4" fill="#F5A623" opacity="0.7"/>

  <!-- Sparkles -->
  <text x="60" y="150" font-size="26" fill="#F5A623" opacity="0.8">✦</text>
  <text x="390" y="160" font-size="22" fill="#2563EB" opacity="0.7">✦</text>
  <text x="80" y="330" font-size="18" fill="#F5A623" opacity="0.6">★</text>
  <text x="380" y="340" font-size="20" fill="#2563EB" opacity="0.6">★</text>
  <text x="160" y="60" font-size="14" fill="#F5A623" opacity="0.7">✦</text>
  <text x="310" y="65" font-size="16" fill="#2563EB" opacity="0.6">✦</text>

  <!-- Confetti -->
  <rect x="50" y="200" width="12" height="6" rx="2" fill="#F5A623" opacity="0.7" transform="rotate(30,56,203)"/>
  <rect x="415" y="210" width="12" height="6" rx="2" fill="#2563EB" opacity="0.7" transform="rotate(-20,421,213)"/>
  <rect x="70" y="390" width="10" height="5" rx="2" fill="#F5A623" opacity="0.6" transform="rotate(45,75,392)"/>
  <rect x="400" y="400" width="10" height="5" rx="2" fill="#2563EB" opacity="0.6" transform="rotate(-35,405,402)"/>
  <circle cx="110" cy="400" r="6" fill="#F5A623" opacity="0.5"/>
  <circle cx="370" cy="410" r="6" fill="#2563EB" opacity="0.5"/>

  <!-- Text -->
  <text x="240" y="390" font-family="Georgia, serif" font-size="28" font-weight="bold" text-anchor="middle" fill="#1D4ED8" letter-spacing="1">Work Anniversary</text>
  <text x="240" y="425" font-family="Georgia, serif" font-size="17" text-anchor="middle" fill="#F5A623" opacity="0.95">Thank you for your dedication 🏅</text>
</svg>
