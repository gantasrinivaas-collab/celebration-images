<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1A1040"/>
      <stop offset="100%" stop-color="#0D0820"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD166" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#FFD166" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="480" fill="url(#bg)" rx="16"/>

  <!-- Glow center -->
  <ellipse cx="240" cy="220" rx="180" ry="160" fill="url(#glow)"/>

  <!-- Star burst center -->
  <polygon points="240,120 248,200 320,210 248,220 240,300 232,220 160,210 232,200" fill="#FFD166" opacity="0.15"/>

  <!-- Gift box -->
  <rect x="165" y="240" width="150" height="120" rx="8" fill="#4361EE"/>
  <rect x="165" y="240" width="150" height="28" rx="4" fill="#3A0CA3"/>
  <!-- Ribbon vertical -->
  <rect x="232" y="240" width="16" height="120" fill="#F72585" opacity="0.9"/>
  <!-- Ribbon bow -->
  <path d="M240 238 Q210 210 195 225 Q185 238 210 242 Q225 240 240 238 Z" fill="#F72585"/>
  <path d="M240 238 Q270 210 285 225 Q295 238 270 242 Q255 240 240 238 Z" fill="#F72585"/>
  <circle cx="240" cy="238" r="9" fill="#FF6B9D"/>
  <!-- Box shine -->
  <rect x="175" y="252" width="40" height="6" rx="3" fill="white" opacity="0.15"/>

  <!-- Stars scattered -->
  <text x="80" y="120" font-size="28" fill="#FFD166" opacity="0.9">★</text>
  <text x="370" y="110" font-size="22" fill="#A29BFE" opacity="0.9">★</text>
  <text x="55" y="280" font-size="18" fill="#F72585" opacity="0.8">★</text>
  <text x="410" y="300" font-size="24" fill="#FFD166" opacity="0.8">★</text>
  <text x="140" y="430" font-size="16" fill="#A29BFE" opacity="0.7">★</text>
  <text x="330" y="440" font-size="20" fill="#F72585" opacity="0.7">★</text>
  <text x="200" y="65" font-size="14" fill="#FFD166" opacity="0.8">✦</text>
  <text x="270" y="70" font-size="18" fill="#A29BFE" opacity="0.7">✦</text>
  <text x="430" y="180" font-size="16" fill="#FFD166" opacity="0.6">✦</text>
  <text x="35" y="160" font-size="14" fill="#F72585" opacity="0.6">✦</text>

  <!-- Sparkle dots -->
  <circle cx="120" cy="190" r="3" fill="#FFD166" opacity="0.8"/>
  <circle cx="360" cy="170" r="3" fill="#A29BFE" opacity="0.8"/>
  <circle cx="440" cy="380" r="4" fill="#FFD166" opacity="0.7"/>
  <circle cx="50" cy="390" r="3" fill="#F72585" opacity="0.7"/>
  <circle cx="240" cy="50" r="4" fill="#FFD166" opacity="0.6"/>

  <!-- Text -->
  <text x="240" y="415" font-family="Georgia, serif" font-size="34" font-weight="bold" text-anchor="middle" fill="#FFD166" letter-spacing="2">Happy Birthday!</text>
  <text x="240" y="450" font-family="Georgia, serif" font-size="16" text-anchor="middle" fill="#A29BFE" opacity="0.9">You're a star ✨</text>
</svg>
