<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF8E7"/>
      <stop offset="100%" stop-color="#FFF0D0"/>
    </linearGradient>
  </defs>
  <rect width="480" height="480" fill="url(#bg)" rx="16"/>

  <!-- Geometric confetti shapes -->
  <polygon points="80,60 95,90 65,90" fill="#F72585" opacity="0.8"/>
  <polygon points="400,70 415,100 385,100" fill="#4361EE" opacity="0.8"/>
  <polygon points="50,220 65,250 35,250" fill="#FFD166" opacity="0.7"/>
  <polygon points="430,230 445,260 415,260" fill="#90BE6D" opacity="0.8"/>
  <polygon points="150,420 165,450 135,450" fill="#F72585" opacity="0.7"/>
  <polygon points="330,415 345,445 315,445" fill="#4361EE" opacity="0.7"/>

  <rect x="115" y="50" width="16" height="16" rx="3" fill="#4361EE" opacity="0.7" transform="rotate(20,123,58)"/>
  <rect x="345" y="45" width="14" height="14" rx="3" fill="#F72585" opacity="0.7" transform="rotate(-30,352,52)"/>
  <rect x="40" y="310" width="14" height="14" rx="3" fill="#90BE6D" opacity="0.7" transform="rotate(40,47,317)"/>
  <rect x="430" y="340" width="14" height="14" rx="3" fill="#FFD166" opacity="0.7" transform="rotate(-15,437,347)"/>
  <circle cx="200" cy="50" r="8" fill="#90BE6D" opacity="0.7"/>
  <circle cx="290" cy="55" r="7" fill="#F72585" opacity="0.7"/>
  <circle cx="460" cy="150" r="9" fill="#4361EE" opacity="0.6"/>
  <circle cx="25" cy="160" r="8" fill="#FFD166" opacity="0.7"/>
  <circle cx="460" cy="430" r="7" fill="#F72585" opacity="0.6"/>
  <circle cx="25" cy="440" r="8" fill="#4361EE" opacity="0.6"/>

  <!-- Big center star badge -->
  <polygon points="240,100 255,150 305,150 265,180 280,230 240,200 200,230 215,180 175,150 225,150" fill="#FFD166" opacity="0.15"/>
  <polygon points="240,110 253,148 293,148 261,171 274,209 240,186 206,209 219,171 187,148 227,148" fill="#FFD166" opacity="0.25"/>

  <!-- Cake slice icon -->
  <path d="M180 230 L240 165 L300 230 Z" fill="#F9C74F" opacity="0.9"/>
  <rect x="170" y="228" width="140" height="85" rx="10" fill="#F9C74F"/>
  <rect x="170" y="228" width="140" height="22" rx="5" fill="#F3722C"/>
  <!-- frosting drips -->
  <path d="M170 233 Q185 252 200 233 Q215 252 230 233 Q245 252 260 233 Q275 252 290 233 Q305 252 310 233" fill="none" stroke="white" stroke-width="7" stroke-linecap="round"/>
  <!-- Candle -->
  <rect x="233" y="195" width="14" height="36" rx="5" fill="#F72585"/>
  <ellipse cx="240" cy="190" rx="7" ry="10" fill="#FFD166" opacity="0.95"/>
  <ellipse cx="240" cy="188" rx="4" ry="6" fill="white" opacity="0.6"/>

  <!-- Stars around cake -->
  <text x="120" y="205" font-size="20" fill="#FFD166" opacity="0.9">★</text>
  <text x="340" y="205" font-size="20" fill="#F72585" opacity="0.9">★</text>
  <text x="100" y="260" font-size="16" fill="#4361EE" opacity="0.8">✦</text>
  <text x="360" y="265" font-size="16" fill="#90BE6D" opacity="0.8">✦</text>

  <!-- Text -->
  <text x="240" y="365" font-family="Georgia, serif" font-size="36" font-weight="bold" text-anchor="middle" fill="#D63060" letter-spacing="1">Happy Birthday!</text>
  <text x="240" y="405" font-family="Georgia, serif" font-size="17" text-anchor="middle" fill="#F3722C" opacity="0.9">Here's to you! 🎂</text>
</svg>
